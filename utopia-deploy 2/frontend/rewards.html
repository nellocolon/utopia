<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rewards Store — UTOPIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#070810;--bg2:#0d0f1e;--bg3:#12152a;--border:rgba(99,120,255,0.15);--border2:rgba(99,120,255,0.08);--neon:#6378ff;--neon2:#00e5ff;--neon3:#a855f7;--text:#e8eaf6;--text2:#8b93c4;--text3:#4a527a;--success:#00c896;--warn:#ffaa00;--accent:#ff6b6b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%}
html,body{overflow-x:hidden;max-width:100%;width:100%}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,120,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,120,255,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}

/* Topbar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(7,8,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2)}
.logo{font-size:18px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.xp-chip{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:rgba(99,120,255,0.1);border:1px solid rgba(99,120,255,0.2);font-size:13px;font-family:'DM Mono',monospace}
.xp-chip span{color:var(--neon2);font-weight:700}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--neon);color:var(--neon)}
.btn-neon{background:linear-gradient(135deg,var(--neon),var(--neon3));color:#fff}
.btn-neon:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,120,255,0.4)}

/* Hero */
.store-hero{position:relative;z-index:1;text-align:center;padding:60px 40px 40px}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:250px;background:radial-gradient(ellipse,rgba(99,120,255,0.1) 0%,transparent 70%);pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-size:11px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--neon3);margin-bottom:16px}
.hero-title{font-size:clamp(28px,5vw,56px);font-weight:800;letter-spacing:-1px;margin-bottom:12px}
.grad{background:linear-gradient(135deg,var(--neon3),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:16px;color:var(--text2);max-width:500px;margin:0 auto}

/* Filter tabs */
.filter-bar{max-width:900px;margin:0 auto;padding:0 40px 24px;display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
.filter-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--neon);color:var(--neon)}
.filter-btn.active{border-color:var(--neon3);background:rgba(168,85,247,0.1);color:var(--neon3)}

/* Grid */
.rewards-grid{max-width:900px;margin:0 auto;padding:0 40px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;position:relative;z-index:1}

/* Reward card */
.reward-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all .25s;position:relative}
.reward-card:hover{border-color:rgba(99,120,255,0.4);transform:translateY(-4px);box-shadow:0 20px 60px rgba(99,120,255,0.1)}
.reward-card.coming-soon-card{cursor:not-allowed}
.reward-card.coming-soon-card:hover{transform:none;box-shadow:none}
.reward-card.coming-soon-card .card-body{opacity:.4}
.card-header{height:140px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;overflow:hidden}
.card-header::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c1,rgba(99,120,255,0.2)),var(--c2,rgba(0,229,255,0.1)))}
.card-body{padding:20px}
.card-type{font-size:10px;letter-spacing:2px;font-family:'DM Mono',monospace;margin-bottom:8px}
.type-fiat{color:var(--success)}
.type-product{color:var(--neon)}
.type-service{color:var(--neon3)}
.type-digital{color:var(--neon2)}
.type-crypto{color:var(--warn)}
.card-name{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-xp{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:var(--neon)}
.card-xp span{font-size:12px;color:var(--text3);font-weight:400}
.card-stock{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.claim-btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;border:none}
.claim-btn.can-afford{background:linear-gradient(135deg,var(--neon),var(--neon3));color:#fff}
.claim-btn.can-afford:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,120,255,0.4)}
.claim-btn.cant-afford{background:var(--bg3);border:1px solid var(--border);color:var(--text3);cursor:not-allowed}
.claim-btn.claimed{background:rgba(0,200,150,0.15);border:1px solid rgba(0,200,150,0.3);color:var(--success)}

/* Coming soon overlay */
.cs-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,8,16,0.6);backdrop-filter:blur(2px);z-index:5;border-radius:inherit}
.cs-badge{padding:6px 16px;border-radius:20px;background:rgba(255,170,0,0.15);border:1px solid rgba(255,170,0,0.3);color:var(--warn);font-size:11px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:2px}

/* XP needed indicator */
.xp-needed{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);margin-top:4px}

/* Claim modal */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:440px;transform:translateY(16px);transition:transform .2s;text-align:center}
.modal-bg.open .modal{transform:translateY(0)}
.modal-icon{font-size:48px;margin-bottom:16px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:8px}
.modal-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.modal-xp{font-size:32px;font-weight:800;font-family:'DM Mono',monospace;color:var(--neon);margin-bottom:20px}
.modal-btns{display:flex;gap:12px}
.modal-btns button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;border:none}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 18px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--success)}
#toast.err{border-color:var(--accent)}

@media(max-width:768px){
  .topbar{padding:14px 20px}
  .store-hero{padding:40px 20px 28px}
  .filter-bar,.rewards-grid{padding:0 20px 40px}
}
html,body{overflow-x:hidden;max-width:100%;}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="index.html" class="logo">UTOPIA</a>
  <div class="xp-chip">⭐ Your XP: <span id="user-xp">1,250</span></div>
  <div style="display:flex;gap:8px">
    <a href="community.html" class="btn btn-ghost">← Community</a>
    <a href="dashboard.html" class="btn btn-neon">Dashboard</a>
  </div>
</div>

<!-- Hero -->
<div class="store-hero">
  <div class="hero-glow"></div>
  <div class="hero-tag">◆ REWARDS STORE</div>
  <div class="hero-title">Spend your <span class="grad">hard-earned XP</span></div>
  <div class="hero-sub">Exchange your community XP for real rewards. Gift cards, products, services and more.</div>
</div>

<!-- Filter Bar -->
  <!-- Plan note -->
  <div style="text-align:center;margin:-8px 0 20px;position:relative;z-index:1">
    <span style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text3)">
      <span style="color:var(--success)">●</span> Rewards store available on <strong style="color:var(--neon)">Growth plan</strong> and above
    </span>
  </div>
<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all', this)">All Rewards</button>
  <button class="filter-btn" onclick="filter('fiat', this)">💵 Cash & Gift Cards</button>
  <button class="filter-btn" onclick="filter('product', this)">🎁 Products</button>
  <button class="filter-btn" onclick="filter('service', this)">⭐ Services</button>
  <button class="filter-btn" onclick="filter('digital', this)">💻 Digital</button>
  <button class="filter-btn" onclick="filter('crypto', this)">🪙 Crypto (Soon)</button>
</div>

<!-- Rewards Grid -->
<div class="rewards-grid" id="rewards-grid"></div>

<!-- Claim Modal -->
<div class="modal-bg" id="claim-modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">◆</div>
    <div class="modal-title" id="modal-title">Claim Reward</div>
    <div class="modal-sub" id="modal-desc">Are you sure you want to claim this reward?</div>
    <div class="modal-xp" id="modal-xp">—</div>
    <div id="modal-balance" style="font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:20px"></div>
    <div class="modal-btns">
      <button style="background:var(--bg3);border:1px solid var(--border);color:var(--text2)" onclick="closeModal()">Cancel</button>
      <button style="background:linear-gradient(135deg,var(--neon),var(--neon3));color:#fff" onclick="confirmClaim()">Confirm Claim →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let userXP = 1250;
let currentFilter = 'all';
let pendingClaim = null;
const claimed = {};

const REWARDS = [
  {id:'r1',name:'$10 Gift Card',type:'fiat',icon:'💵',desc:'Amazon, Steam or Google Play gift card. Delivered via email within 24h.',xp:500,stock:10,color1:'rgba(0,200,150,0.2)',color2:'rgba(0,229,255,0.1)'},
  {id:'r2',name:'$25 Gift Card',type:'fiat',icon:'💵',desc:'Premium Amazon or PayPal gift card. Your choice of platform.',xp:1200,stock:5,color1:'rgba(0,200,150,0.2)',color2:'rgba(0,229,255,0.1)'},
  {id:'r3',name:'UTOPIA T-Shirt',type:'product',icon:'👕',desc:'Limited edition UTOPIA merch. Worldwide shipping included.',xp:1000,stock:25,color1:'rgba(99,120,255,0.2)',color2:'rgba(168,85,247,0.1)'},
  {id:'r4',name:'UTOPIA Hoodie',type:'product',icon:'🧥',desc:'Premium quality hoodie. Limited stock.',xp:2500,stock:8,color1:'rgba(99,120,255,0.2)',color2:'rgba(168,85,247,0.1)'},
  {id:'r5',name:'3 Months Pro',type:'service',icon:'⭐',desc:'3 months of UTOPIA Pro subscription — manage up to 25 communities.',xp:750,stock:null,color1:'rgba(168,85,247,0.2)',color2:'rgba(99,120,255,0.1)'},
  {id:'r6',name:'1-on-1 Coaching',type:'service',icon:'🎓',desc:'60 minute session with a community growth expert.',xp:3000,stock:3,color1:'rgba(168,85,247,0.2)',color2:'rgba(255,170,0,0.1)'},
  {id:'r7',name:'Custom NFT',type:'digital',icon:'🖼',desc:'Custom 1-of-1 NFT artwork of your username on the UTOPIA blockchain.',xp:5000,stock:null,color1:'rgba(0,229,255,0.2)',color2:'rgba(168,85,247,0.1)'},
  {id:'r8',name:'Early Access Badge',type:'digital',icon:'🏅',desc:'Exclusive OG badge visible on your UTOPIA profile forever.',xp:200,stock:100,color1:'rgba(0,229,255,0.15)',color2:'rgba(99,120,255,0.1)'},
  {id:'r9',name:'0.1 SOL',type:'crypto',icon:'◎',desc:'Blockchain reward via smart contract. Requires Phantom wallet.',xp:800,stock:50,color1:'rgba(255,170,0,0.2)',color2:'rgba(0,200,150,0.1)',coming:true},
  {id:'r10',name:'Custom Token',type:'crypto',icon:'🪙',desc:'Community tokens with governance rights.',xp:1500,stock:null,color1:'rgba(255,170,0,0.2)',color2:'rgba(99,120,255,0.1)',coming:true}
];

const TYPE_LABELS = {fiat:'CASH & GIFT CARDS',product:'PRODUCT',service:'SERVICE',digital:'DIGITAL',crypto:'CRYPTO'};
const TYPE_CLASSES = {fiat:'type-fiat',product:'type-product',service:'type-service',digital:'type-digital',crypto:'type-crypto'};

function renderRewards() {
  const visible = REWARDS.filter(r => currentFilter === 'all' || r.type === currentFilter);

  document.getElementById('rewards-grid').innerHTML = visible.map(r => {
    const canAfford = userXP >= r.xp;
    const isClaimed = claimed[r.id];
    const xpNeeded = r.xp - userXP;
    return `
    <div class="reward-card ${r.coming ? 'coming-soon-card' : ''}">
      ${r.coming ? `<div class="cs-overlay"><div class="cs-badge">COMING SOON</div></div>` : ''}
      <div class="card-header" style="--c1:${r.color1};--c2:${r.color2}">${r.icon}</div>
      <div class="card-body">
        <div class="card-type ${TYPE_CLASSES[r.type]}">${TYPE_LABELS[r.type]}</div>
        <div class="card-name">${r.name}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-footer">
          <div>
            <div class="card-xp">${r.xp.toLocaleString()} <span>XP</span></div>
            ${!isClaimed && !canAfford && !r.coming ? `<div class="xp-needed">Need ${xpNeeded.toLocaleString()} more XP</div>` : ''}
            ${r.stock !== null ? `<div class="card-stock">${r.stock} left</div>` : ''}
          </div>
          ${r.coming ? '' : isClaimed
            ? `<button class="claim-btn claimed">✓ Claimed</button>`
            : canAfford
              ? `<button class="claim-btn can-afford" onclick="openClaim('${r.id}')">Claim →</button>`
              : `<button class="claim-btn cant-afford">Not enough XP</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRewards();
}

let claimId = null;
function openClaim(id) {
  const r = REWARDS.find(r => r.id === id);
  if(!r) return;
  claimId = id;
  document.getElementById('modal-icon').textContent = r.icon;
  document.getElementById('modal-title').textContent = r.name;
  document.getElementById('modal-desc').textContent = r.desc;
  document.getElementById('modal-xp').textContent = `${r.xp.toLocaleString()} XP`;
  document.getElementById('modal-balance').textContent = `Your balance: ${userXP.toLocaleString()} XP → ${(userXP - r.xp).toLocaleString()} XP after claim`;
  document.getElementById('claim-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('claim-modal').classList.remove('open');
  claimId = null;
}

function confirmClaim() {
  const r = REWARDS.find(r => r.id === claimId);
  if(!r) return;
  userXP -= r.xp;
  claimed[claimId] = true;
  document.getElementById('user-xp').textContent = userXP.toLocaleString();
  closeModal();
  renderRewards();
  toast(`✓ "${r.name}" claimed! Admin will fulfill shortly.`, 'ok');
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3500);
}

document.getElementById('claim-modal').addEventListener('click', e => {
  if(e.target === document.getElementById('claim-modal')) closeModal();
});

renderRewards();
</script>
</body>
</html>
